<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Visualizar Convivências • Caminho</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../../css/home.css">
    <link rel="stylesheet" href="../../css/style.css" />
    <link rel="icon" type="image/x-icon" href="/img/favicon.png" />
</head>
<body>
    <!-- App Header -->
    <header class="app-header">
      <div class="header-left">
        <a href="./convivencias.html" class="back-link">
          <i class="fas fa-arrow-left"></i>
        </a>
        <div class="user-profile">
          <div class="user-info-text">
            <span class="user-name">Lista de Convivências</span>
            <span class="user-role">Comunidade 5</span>
          </div>
        </div>
      </div>
    </header>

    <main class="main-container">
      <section class="welcome-section">
        <h1>Convivências</h1>
        <p>Acompanhe os registros de locais e datas</p>
      </section>

      <div class="results-container">
        <div class="pagination-limit">
          <label for="page-limit">Registros por página:</label>
          <select id="page-limit">
            <option value="10">10</option>
            <option value="20">20</option>
            <option value="50">50</option>
            <option value="100">100</option>
          </select>
        </div>

        <table>
          <thead>
            <tr>
              <th>Local</th>
              <th>Data</th>
              <th>Faltantes</th>
              <th style="text-align: center;">Ações</th>
            </tr>
          </thead>
          <tbody id="results-list">
            <!-- Os resultados serão inseridos aqui via JS -->
          </tbody>
        </table>

        <div id="pagination-container" class="pagination-controls">
          <!-- Controles de paginação via JS -->
        </div>
      </div>
    </main>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
      <a href="../../index.html" class="nav-item">
        <i class="fas fa-home"></i>
        <span>Início</span>
      </a>
      <a href="../celebracoes/celebracoes.html" class="nav-item">
        <i class="fas fa-church"></i>
        <span>Celeb.</span>
      </a>
      <div class="nav-item nav-item-center">
        <a href="../liturgia/liturgia.html" class="center-btn">
          <i class="fas fa-bible"></i>
        </a>
      </div>
      <a href="./convivencias.html" class="nav-item active">
        <i class="fas fa-users"></i>
        <span>Conviv.</span>
      </a>
      <a href="../ajuda/ajuda.html" class="nav-item">
        <i class="fas fa-info-circle"></i>
        <span>Ajuda</span>
      </a>
    </nav>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.1/firebase-app.js";
      import { getFirestore, collection, getDocs, doc, getDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.1/firebase-firestore.js";
      import firebaseConfig from '../../js/firebase-config.js';
      const app = initializeApp(firebaseConfig);
      const db = getFirestore(app);
      window.db = db; window.collection = collection; window.getDocs = getDocs;
      window.doc = doc; window.getDoc = getDoc; window.query = query; window.orderBy = orderBy;
    </script>
    <script src="../../js/results_conv.js"></script>
</body>
</html>
