<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Celebrações</title>
    <link rel="stylesheet" href="/css/style.css" />
    <link rel="icon" type="image/x-icon" href="/img/favicon.png" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css"
    />
    <!-- Restante do head permanece igual -->
  </head>
  <body>
    <div id="multiStepForm">
      <form id="form">
        <h2><mark>Celebração</mark></h2>
        <div class="logo">
          <img
            src="https://s3-sa-east-1.amazonaws.com/loja2/502253fe6a1b3fa283a422fd46b0d7fb.jpg"
            alt="Logo"
          />
        </div>

        <div class="form-group">
          <label for="tema">Tema:</label>
          <input
            type="text"
            id="tema"
            name="tema"
            placeholder="Digite o tema da celebração"
            required
          />
        </div>

        <div class="form-group">
          <label for="data">Data:</label>
          <input type="date" id="data" name="data" required />
        </div>

        <div class="form-group">
          <label for="grupo">Grupo Responsável:</label>
          <input
            type="text"
            id="grupo"
            name="grupo"
            placeholder="Pessoas do grupo"
            required
          />
        </div>

        <div class="form-group">
          <label for="participantes">Faltantes:</label>
          <input
            type="text"
            id="participantes"
            name="participantes"
            placeholder="Nome dos faltantes"
            required
          />
        </div>

        <div class="button">
          <button type="button" onclick="submitForm()">Salvar Dados</button>
          <div class="home">
            <a href="/index.html"><i class="fas fa-reply"></i> Voltar</a>
          </div>
        </div>
      </form>
    </div>

    <!-- Script permanece igual -->
    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.1/firebase-app.js";
      import {
        getFirestore,
        collection,
        addDoc,
        serverTimestamp,
        Timestamp,
      } from "https://www.gstatic.com/firebasejs/10.12.1/firebase-firestore.js";

      const firebaseConfig = {
        apiKey: "AIzaSyCFu1Y1ml9bB-Fna6859_RfXTF7bbPvP1U",
        authDomain: "caminho-comunidade6.firebaseapp.com",
        projectId: "caminho-comunidade6",
        storageBucket: "caminho-comunidade6.firebasestorage.app",
        messagingSenderId: "723550846433",
        appId: "1:723550846433:web:1fb390b81cd3e132a026a0",
        measurementId: "G-EHV4MC98BE",
      };

      // Initialize Firebase
      const app = initializeApp(firebaseConfig);
      const db = getFirestore(app);

      window.submitForm = async function () {
        const tema = document.getElementById("tema").value.trim();
        const data = document.getElementById("data").value.trim();
        const grupo = document.getElementById("grupo").value.trim();
        const participantes = document
          .getElementById("participantes")
          .value.trim();

        if (!tema || !data || !participantes || !grupo) {
          alert("Por favor, preencha todos os campos corretamente.");
          return;
        }

        // Converte a data de DD/MM/AAAA para Timestamp
        const [day, month, year] = data.split("/");
        const formattedDate = new Date(`${year}-${month}-${day}`);
        const timestamp = Timestamp.fromDate(formattedDate);

        try {
          await addDoc(collection(db, "celebracoes"), {
            tema,
            data: timestamp, // Armazenar como Timestamp
            grupo,
            participantes,
            createdAt: serverTimestamp(),
          });
          alert("Dados salvos com sucesso!");
          document.getElementById("form").reset();
        } catch (error) {
          console.error("Erro ao salvar dados: ", error);
          alert("Ocorreu um erro ao salvar os dados. Tente novamente.");
        }
      };
    </script>
  </body>
</html>
